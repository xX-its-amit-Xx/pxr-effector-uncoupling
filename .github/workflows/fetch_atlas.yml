name: Fetch Census Atlas Data

on:
  workflow_dispatch:  # manual trigger only

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system cellxgene-census anndata scipy numpy pandas pyarrow

      - name: Fetch expression data
        run: |
          python scripts/fetch_atlas.py
        timeout-minutes: 20

      - name: Upload H5AD artifact
        uses: actions/upload-artifact@v4
        with:
          name: nr1i2_atlas
          path: data/raw/nr1i2_atlas.h5ad
          retention-days: 30

      - name: Commit H5AD to data branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B data/atlas
          git add -f data/raw/nr1i2_atlas.h5ad
          git commit -m "Add fetched nr1i2_atlas.h5ad from Census 2025-01-30"
          git push origin data/atlas --force
